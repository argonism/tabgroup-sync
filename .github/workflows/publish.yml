name: Publish to Chrome Web Store

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:run
      - run: npm run typecheck
      - run: npm run build

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('dist/manifest.json','utf-8')).version)")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "Version: $MANIFEST_VERSION"

      - name: Create zip
        run: cd dist && zip -r ../extension.zip .

      - name: Upload to Chrome Web Store
        uses: nicolo-ribaudo/upload-to-chrome-web-store@v1
        with:
          extension-id: ${{ secrets.EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          zip-path: extension.zip
          publish: true

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip
