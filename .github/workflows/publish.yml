name: Publish to Chrome Web Store

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:run
      - run: npm run typecheck
      - run: npm run build

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('dist/manifest.json','utf-8')).version)")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "Version: $MANIFEST_VERSION"

      - name: Create zip
        run: cd dist && zip -r ../extension.zip .

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Upload to Chrome Web Store
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
               -X POST \
               -T extension.zip \
               "https://chromewebstore.googleapis.com/upload/v2/publishers/${{ secrets.PUBLISHER_ID }}/items/${{ secrets.EXTENSION_ID }}:upload")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then echo "::error::Upload failed with HTTP $HTTP_CODE"; exit 1; fi

      - name: Publish to Chrome Web Store
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
               -X POST \
               "https://chromewebstore.googleapis.com/v2/publishers/${{ secrets.PUBLISHER_ID }}/items/${{ secrets.EXTENSION_ID }}:publish")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then echo "::error::Publish failed with HTTP $HTTP_CODE"; exit 1; fi

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip
